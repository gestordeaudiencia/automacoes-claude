name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test
